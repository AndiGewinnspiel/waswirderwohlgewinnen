
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #888; min-height: 100%; }
  #app { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #888; min-height: 100vh; padding: 30px 20px 40px; position: relative; z-index: 1; }
  #welcome-text { color: #fff; font-size: 16px; font-weight: 500; text-align: center; max-width: 360px; margin-bottom: 10px; line-height: 1.5; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
  #wheel-container { position: relative; width: 400px; height: 400px; margin-top: 20px; }
  #arrow-wrap { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); width: 32px; height: 36px; display: flex; align-items: flex-start; justify-content: center; z-index: 10; transform-origin: 50% 0%; }
  canvas#wheel { border-radius: 50%; border: 4px solid #111; display: block; }
  #spin-btn { margin-top: 28px; padding: 14px 48px; font-size: 20px; font-weight: 700; background: #e02020; color: #111; border: 3px solid #111; border-radius: 8px; cursor: pointer; letter-spacing: 1px; }
  #spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #result-box { margin-top: 20px; color: #fff; font-size: 17px; font-weight: 700; text-align: center; max-width: 380px; display: none; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
  #fireworks { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; display: none; background: transparent !important; }
</style>

<div id="app">
  <p id="welcome-text">Willkommen zu deinem Geburtstagsglücksrad! Dreh wenn du bereit bist und erhalte deinen Gewinn :)</p>
  <div id="wheel-container">
    <div id="arrow-wrap">
      <svg width="32" height="32" viewBox="0 0 32 32">
        <polygon points="16,30 2,2 30,2" fill="#111" stroke="#111" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <canvas id="wheel" width="400" height="400"></canvas>
  </div>
  <button id="spin-btn">Drehen</button>
  <div id="result-box"></div>
</div>
<canvas id="fireworks"></canvas>

<script>
const segments = [
  "Gemeinsamer Casinobesuch mit Flora und Valentin",
  "Gutschein für 1x Friedhofsbesuch mit Oma",
  "Meet and Greet mit DJ Ötzi",
  "1 000 000 000 €",
  "Spruchheft mit besseren Jass-Sprüchen als die von Opa",
  "Leider kein Gewinn",
  "Anette Bar Neueröffnung",
  "Gutschein für 3x Valentin vor Gericht vertreten"
];
const colors = ["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c","#e67e22","#e91e8c"];
const n = segments.length;
const sliceAngle = (2 * Math.PI) / n;
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const W = 400, H = 400, R = 196, cx = W/2, cy = H/2;

// Segment 3 ("1 000 000 000 €") soll oben sein.
// Oben = Pfeil zeigt auf -PI/2. Segmentmitte von Index 3: currentAngle + 3*sliceAngle + sliceAngle/2 = -PI/2
// => currentAngle = -PI/2 - 3*sliceAngle - sliceAngle/2
const currentAngleInit = -Math.PI / 2 - 3 * sliceAngle - sliceAngle / 2;
let currentAngle = currentAngleInit;

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let lines = [], line = '';
  for (let w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  const totalH = lines.length * lineHeight;
  const startY = y - totalH / 2 + lineHeight / 2;
  lines.forEach((l, i) => ctx.fillText(l, x, startY + i * lineHeight));
}

function drawWheel(angle) {
  ctx.clearRect(0, 0, W, H);
  for (let i = 0; i < n; i++) {
    const start = angle + i * sliceAngle, end = start + sliceAngle;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, R, start, end); ctx.closePath();
    ctx.fillStyle = colors[i]; ctx.fill();
    ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.stroke();
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(start + sliceAngle / 2);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff'; ctx.font = '11px sans-serif';
    wrapText(ctx, segments[i], R * 0.6, 0, R * 0.75, 13);
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(cx, cy, 14, 0, 2 * Math.PI);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 3; ctx.stroke();
}
drawWheel(currentAngle);

const arrowWrap = document.getElementById('arrow-wrap');
let arrowRotation = 0, arrowVel = 0;
(function arrowPhysics() {
  arrowVel += -0.18 * arrowRotation; arrowVel *= 0.72; arrowRotation += arrowVel;
  arrowWrap.style.transform = `translateX(-50%) rotate(${arrowRotation}rad)`;
  requestAnimationFrame(arrowPhysics);
})();

function getWinningSegment(finalAngle) {
  const normalized = ((-Math.PI/2 - finalAngle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  return segments[Math.floor(normalized / sliceAngle) % n];
}

function checkBumps(prevAngle, newAngle) {
  const delta = newAngle - prevAngle;
  if (Math.abs(delta) < 0.0001) return;
  for (let i = 0; i < n; i++) {
    const topTarget = 3 * Math.PI / 2;
    const topPrev = ((prevAngle + i * sliceAngle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
    const topCurr = ((newAngle + i * sliceAngle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
    let crossed = false;
    if (delta > 0) {
      if (topPrev < topTarget && topCurr >= topTarget) crossed = true;
      if (topPrev > topCurr && (topPrev < topTarget || topCurr >= topTarget)) crossed = true;
    }
    if (crossed) arrowVel = -0.35;
  }
}

const btn = document.getElementById('spin-btn');
const resultBox = document.getElementById('result-box');
function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

btn.addEventListener('click', () => {
  btn.disabled = true;
  resultBox.style.display = 'none';
  resultBox.textContent = '';

  // Segment 0 gewinnt immer → Pfeil zeigt auf Segment 0
  const winAngle = -Math.PI / 2 - sliceAngle / 2;
  const extraSpins = 2 * Math.PI * (7 + Math.floor(Math.random() * 3));
  const delta = ((winAngle - currentAngle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  const totalForward = extraSpins + delta;
  const startAngle = currentAngle;
  let phase1Start = null;

  function phase1(ts) {
    if (!phase1Start) phase1Start = ts;
    const t = Math.min((ts - phase1Start) / 2000, 1);
    const newAngle = startAngle + (-(20*Math.PI/180)) * Math.sin(t * Math.PI / 2);
    checkBumps(currentAngle, newAngle); currentAngle = newAngle; drawWheel(currentAngle);
    if (t < 1) requestAnimationFrame(phase1); else requestAnimationFrame(phase2);
  }

  let phase2Start = null, p2StartAngle, p2EndAngle;
  function phase2(ts) {
    if (!phase2Start) { phase2Start = ts; p2StartAngle = currentAngle; p2EndAngle = p2StartAngle + totalForward; }
    const t = Math.min((ts - phase2Start) / 10000, 1);
    const newAngle = p2StartAngle + (p2EndAngle - p2StartAngle) * easeOut(t);
    checkBumps(currentAngle, newAngle); currentAngle = newAngle; drawWheel(currentAngle);
    if (t < 1) requestAnimationFrame(phase2);
    else {
      currentAngle = p2EndAngle; drawWheel(currentAngle);
      const winner = getWinningSegment(currentAngle);
      setTimeout(() => {
        launchFireworks();
        resultBox.textContent = '🎉 Gewonnen: ' + winner;
        resultBox.style.display = 'block';
      }, 400);
      setTimeout(() => { btn.disabled = false; }, 6000);
    }
  }
  requestAnimationFrame(phase1);
});

const fwCanvas = document.getElementById('fireworks');
const fwCtx = fwCanvas.getContext('2d');
let particles = [], fwAnim = null;

function spawnBurst(x, y, hue, count) {
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * 2 * Math.PI + Math.random() * 0.3;
    const speed = 3 + Math.random() * 6;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      alpha: 1, size: 2 + Math.random()*3, color: `hsl(${hue + Math.random()*40-20},100%,60%)`, trail: [] });
  }
}

function spawnRocket(tx, ty, hue) {
  return new Promise(resolve => {
    const sx = tx + (Math.random()-0.5)*100, sy = fwCanvas.height;
    const dur = 600 + Math.random()*400, t0 = performance.now();
    function rise(ts) {
      const t = Math.min((ts - t0) / dur, 1);
      fwCtx.beginPath(); fwCtx.arc(sx+(tx-sx)*t, sy+(ty-sy)*t, 3, 0, 2*Math.PI);
      fwCtx.fillStyle = `hsl(${hue},100%,80%)`; fwCtx.globalAlpha = 1; fwCtx.fill();
      if (t < 1) requestAnimationFrame(rise); else { spawnBurst(tx, ty, hue, 55); resolve(); }
    }
    requestAnimationFrame(rise);
  });
}

function launchFireworks() {
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
  fwCanvas.style.display = 'block';
  particles = [];
  const hues = [0,40,60,120,200,270,300,180];
  let launched = 0;
  async function wave() {
    const cnt = 3 + Math.floor(Math.random()*3);
    await Promise.all(Array.from({length:cnt}, () =>
      spawnRocket(fwCanvas.width*(0.15+Math.random()*0.7), fwCanvas.height*(0.08+Math.random()*0.45), hues[Math.floor(Math.random()*hues.length)])
    ));
    if (++launched < 5) setTimeout(wave, 300);
    else setTimeout(() => {
      fwCanvas.style.display = 'none';
      fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
      particles = [];
    }, 2500);
  }
  wave();
  if (fwAnim) cancelAnimationFrame(fwAnim);
  function animFW() {
    fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
    particles = particles.filter(p => p.alpha > 0.02);
    particles.forEach(p => {
      p.trail.push({x:p.x,y:p.y,alpha:p.alpha});
      if (p.trail.length > 8) p.trail.shift();
      p.trail.forEach((pt,i) => {
        fwCtx.beginPath(); fwCtx.arc(pt.x,pt.y,p.size*(i/p.trail.length),0,2*Math.PI);
        fwCtx.fillStyle=p.color; fwCtx.globalAlpha=pt.alpha*(i/p.trail.length)*0.5; fwCtx.fill();
      });
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.vx*=0.98; p.alpha-=0.013;
      fwCtx.beginPath(); fwCtx.arc(p.x,p.y,p.size,0,2*Math.PI);
      fwCtx.fillStyle=p.color; fwCtx.globalAlpha=Math.max(p.alpha,0); fwCtx.fill();
      fwCtx.globalAlpha=1;
    });
    fwAnim = requestAnimationFrame(animFW);
  }
  fwAnim = requestAnimationFrame(animFW);
}
</script>
